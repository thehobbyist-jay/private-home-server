# docker-compose.yml
name: private-home-networking
services:
  volumes-init-networking:
    image: alpine:3.20
    container_name: volumes_init_networking
    command:
      - /bin/sh
      - -ec
      - /stack/init.sh
    environment:
      - DOCKER_VOLUMES_ROOT=${DOCKER_VOLUMES_ROOT:-/home/docker-volume}
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}:${DOCKER_VOLUMES_ROOT:-/home/docker-volume}
      - ./stacks/networking:/stack:ro
    restart: "no"

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    hostname: pihole
    environment:
      TZ: "${TIMEZONE:-Asia/Kolkata}"
      FTLCONF_webserver_api_password: "${PIHOLE_WEB_PASSWORD:-}"
      FTLCONF_dns_listeningMode: "ALL"
      FTLCONF_misc_etc_dnsmasq_d: "true"
    ports:
      - "${PIHOLE_WEB_LOCAL_PORT:-8080}:80/tcp"
      - "${SERVER_IP:-127.0.0.1}:53:53/tcp"
      - "${SERVER_IP:-127.0.0.1}:53:53/udp"
    depends_on:
      volumes-init-networking:
        condition: service_completed_successfully
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/pihole/etc-pihole:/etc/pihole
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped

  twingate-connector:
    container_name: twingate_connector
    image: twingate/connector:latest
    restart: unless-stopped
    environment:
      - TWINGATE_NETWORK=${TWINGATE_NETWORK:-}
      - TWINGATE_ACCESS_TOKEN=${TWINGATE_ACCESS_TOKEN:-}
      - TWINGATE_REFRESH_TOKEN=${TWINGATE_REFRESH_TOKEN:-}
      - TWINGATE_LABEL_HOSTNAME=${TWINGATE_LABEL_HOSTNAME:-private-home-server}
    networks:
      - monitor_network

networks:
  monitor_network:
    driver: bridge
