# docker-compose.yml
name: private-home-server
services:
  volumes-init-core:
    image: alpine:3.20
    container_name: volumes_init_core
    command:
      - /bin/sh
      - -ec
      - |
        ROOT="$${DOCKER_VOLUMES_ROOT:-/host/docker-volume}"
        mkdir -p \
          "$${ROOT}/pihole/etc-pihole" \
          "$${ROOT}/pihole/etc-dnsmasq.d" \
          "$${ROOT}/portainer/data" \
          "$${ROOT}/glances/config" \
          "$${ROOT}/dashy"
        GLANCES_CONF="$${ROOT}/glances/config/glances.conf"
        DASHY_CONF="$${ROOT}/dashy/conf.yml"
        if [ ! -f "$${GLANCES_CONF}" ]; then
          printf '%s\n' \
            '[global]' \
            'check_update=false' \
            '' \
            '[docker]' \
            'disable=false' \
            '' \
            '[connections]' \
            'disable=false' > "$${GLANCES_CONF}"
        fi
        if [ ! -f "$${DASHY_CONF}" ]; then
          printf '%s\n' \
            'pageInfo:' \
            '  title: Home Dashboard' \
            'sections: []' > "$${DASHY_CONF}"
        fi
        chown -R 1000:1000 \
          "$${ROOT}/pihole" \
          "$${ROOT}/portainer" \
          "$${ROOT}/glances" \
          "$${ROOT}/dashy"
        chmod -R 755 \
          "$${ROOT}/pihole" \
          "$${ROOT}/portainer" \
          "$${ROOT}/glances" \
          "$${ROOT}/dashy"
    environment:
      - DOCKER_VOLUMES_ROOT=${DOCKER_VOLUMES_ROOT:-/host/docker-volume}
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}:${DOCKER_VOLUMES_ROOT:-/host/docker-volume}
    restart: "no"

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    hostname: pihole
    environment:
      TZ: "${TIMEZONE:-Asia/Kolkata}"
      FTLCONF_webserver_api_password: "${PIHOLE_WEB_PASSWORD:-}"
      FTLCONF_dns_listeningMode: "ALL"
      FTLCONF_misc_etc_dnsmasq_d: "true"
    ports:
      - "${PIHOLE_WEB_LOCAL_PORT:-8080}:80/tcp"
      - "${PIHOLE_BIND_IP:-127.0.0.1}:53:53/tcp"
      - "${PIHOLE_BIND_IP:-127.0.0.1}:53:53/udp"
    depends_on:
      volumes-init-core:
        condition: service_completed_successfully
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/pihole/etc-pihole:/etc/pihole
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    ports:
      - "9000:9000"
      - "9443:9443"
    environment:
      - TZ=${TIMEZONE:-Asia/Kolkata}
    depends_on:
      volumes-init-core:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/portainer/data:/data
    restart: unless-stopped

  glances:
    container_name: glances
    image: nicolargo/glances:latest-full
    restart: unless-stopped
    ports:
      - "${GLANCES_PORT:-61208}:61208"
    depends_on:
      volumes-init-core:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/glances/config:/etc/glances
    pid: host
    environment:
      - "GLANCES_OPT=-w -C /etc/glances/glances.conf"
      - TZ=${TIMEZONE:-Asia/Kolkata}
    networks:
      - monitor_network

  dashy:
    container_name: dashy
    image: lissy93/dashy:latest
    restart: unless-stopped
    ports:
      - "${DASHY_PORT:-3001}:8080"
    depends_on:
      volumes-init-core:
        condition: service_completed_successfully
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/dashy/conf.yml:/app/user-data/conf.yml
    environment:
      - TZ=${TIMEZONE:-Asia/Kolkata}
    networks:
      - monitor_network

networks:
  monitor_network:
    driver: bridge
