map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name homepi.local dashy.homepi.local vscode.homepi.local portainer.homepi.local glances.homepi.local nextcloud.homepi.local jellyfin.homepi.local qbittorrent.homepi.local immich.homepi.local files.homepi.local;

    location = /ca.crt {
        alias /etc/nginx/ca/home-local-ca.crt;
        types {}
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="home.local-ca.crt"' always;
        add_header Cache-Control "no-store" always;
    }

    location = /ca/home-local-ca.crt {
        alias /etc/nginx/ca/home-local-ca.crt;
        types {}
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="home.local-ca.crt"' always;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name homepi.local;
    include /etc/nginx/snippets/ssl-common.conf;

    location = /ca.crt {
        alias /etc/nginx/ca/home-local-ca.crt;
        types {}
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="home.local-ca.crt"' always;
        add_header Cache-Control "no-store" always;
    }

    location = /ca/home-local-ca.crt {
        alias /etc/nginx/ca/home-local-ca.crt;
        types {}
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="home.local-ca.crt"' always;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 302 https://dashy.homepi.local$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dashy.homepi.local;
    include /etc/nginx/snippets/ssl-common.conf;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://dashy:8080;
    }
}

