server {
    listen 443 ssl;
    server_name files.homepi.local;
    include /etc/nginx/snippets/ssl-common.conf;

    # Unlimted size
    client_max_body_size 20G;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://filebrowser:80;
    }
}

