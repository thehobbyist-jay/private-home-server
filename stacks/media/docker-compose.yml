# stacks/media/docker-compose.yml
name: private-home-media
services:
  volumes-init-media:
    image: alpine:3.20
    container_name: volumes_init_media
    command:
      - /bin/sh
      - -ec
      - /stack/init.sh
    environment:
      - DOCKER_VOLUMES_ROOT=${DOCKER_VOLUMES_ROOT:-/home/docker-volume}
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}:${DOCKER_VOLUMES_ROOT:-/home/docker-volume}
      - ./stacks/media:/stack:ro
    restart: "no"

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    restart: unless-stopped
    ports:
      - "${IMMICH_PORT:-2283}:2283"
    environment:
      - TZ=${TIMEZONE:-Asia/Kolkata}
      - DB_HOSTNAME=database
      - DB_USERNAME=${IMMICH_DB_USERNAME:-postgres}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD:-postgres}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME:-immich}
      - REDIS_HOSTNAME=redis
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/immich/library:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      volumes-init-media:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      database:
        condition: service_healthy

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE:-Asia/Kolkata}
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/immich/model-cache:/cache
    depends_on:
      volumes-init-media:
        condition: service_completed_successfully

  redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    restart: unless-stopped
    depends_on:
      volumes-init-media:
        condition: service_completed_successfully
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD:-postgres}
      - POSTGRES_USER=${IMMICH_DB_USERNAME:-postgres}
      - POSTGRES_DB=${IMMICH_DB_DATABASE_NAME:-immich}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/immich/postgres:/var/lib/postgresql/data
    depends_on:
      volumes-init-media:
        condition: service_completed_successfully
    healthcheck:
      test: pg_isready --dbname=${IMMICH_DB_DATABASE_NAME:-immich} --username=${IMMICH_DB_USERNAME:-postgres} || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    restart: unless-stopped
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    environment:
      - PUID=${JELLYFIN_PUID:-1000}
      - PGID=${JELLYFIN_PGID:-1000}
      - TZ=${TIMEZONE:-Asia/Kolkata}
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/jellyfin/config:/config
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/jellyfin/cache:/cache
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/jellyfin/media:/media
    depends_on:
      volumes-init-media:
        condition: service_completed_successfully

  nextcloud:
    container_name: nextcloud
    image: nextcloud:stable
    restart: unless-stopped
    ports:
      - "${NEXTCLOUD_PORT:-8082}:80"
    environment:
      - TZ=${TIMEZONE:-Asia/Kolkata}
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/nextcloud/html:/var/www/html
    depends_on:
      volumes-init-media:
        condition: service_completed_successfully
