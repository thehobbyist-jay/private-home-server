name: private-home-development
services:
  volumes-init-development:
    image: alpine:3.20
    container_name: volumes_init_development
    command:
      - /bin/sh
      - -ec
      - /stack/init.sh
    environment:
      - DOCKER_VOLUMES_ROOT=${DOCKER_VOLUMES_ROOT:-/home/docker-volume}
      - Server_IP=${Server_IP:-127.0.0.1}
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}:${DOCKER_VOLUMES_ROOT:-/home/docker-volume}
      - ./stacks/development:/stack:ro
    restart: "no"

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    ports:
      - "${PORTAINER_HTTP_PORT:-9000}:9000"
      - "${PORTAINER_HTTPS_PORT:-9443}:9443"
    environment:
      - TZ=${TIMEZONE:-Asia/Kolkata}
    depends_on:
      volumes-init-development:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/portainer/data:/data
    restart: unless-stopped

  glances:
    container_name: glances
    image: nicolargo/glances:latest-full
    restart: unless-stopped
    ports:
      - "${GLANCES_PORT:-61208}:61208"
    depends_on:
      volumes-init-development:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/glances/config:/etc/glances
    pid: host
    environment:
      - "GLANCES_OPT=-w -C /etc/glances/glances.conf"
      - TZ=${TIMEZONE:-Asia/Kolkata}
    networks:
      - dev_network

  dashy:
    container_name: dashy
    image: lissy93/dashy:latest
    restart: unless-stopped
    ports:
      - "${DASHY_PORT:-3001}:8080"
    depends_on:
      volumes-init-development:
        condition: service_completed_successfully
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/dashy/conf.yml:/app/user-data/conf.yml
    environment:
      - TZ=${TIMEZONE:-Asia/Kolkata}
    networks:
      - dev_network

  code-server:
    container_name: code_server
    image: ghcr.io/coder/code-server:latest
    restart: unless-stopped
    ports:
      - "${VSCODE_PORT:-8001}:8001"
    environment:
      - PUID=${VSCODE_PUID:-1000}
      - PGID=${VSCODE_PGID:-1000}
      - TZ=${TIMEZONE:-Asia/Kolkata}
      - PASSWORD=${VSCODE_PASSWORD:-changeme}
      - SUDO_PASSWORD=${VSCODE_SUDO_PASSWORD:-changeme}
      - PORT=${VSCODE_PORT:-8001}
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-/home/docker-volume}/code-server/config:/config
    depends_on:
      volumes-init-development:
        condition: service_completed_successfully
    networks:
      - dev_network

networks:
  dev_network:
    driver: bridge
