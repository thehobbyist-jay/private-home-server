x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  orcaslicer:
    image: lscr.io/linuxserver/orcaslicer:latest
    container_name: orcaslicer
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - seccomp=unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE}
    volumes:
      - ${DOCKER_VOLUMES_ROOT}/orcaslicer/config:/config
      - ${DOCKER_VOLUMES_ROOT}/orcaslicer/exports/downloads:/config/Downloads
      - ${DOCKER_VOLUMES_ROOT}/orcaslicer/exports/sliced:/config/.config/OrcaSlicer/cache
    networks:
      - proxy_net

  # motioneye:
  #   container_name: motioneye
