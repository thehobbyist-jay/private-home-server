  #   restart: unless-stopped
  #   ports:
  #     - "9009:8765"
  #   volumes:
  #     - /etc/localtime:/etc/localtime:ro
  #     - ${DOCKER_VOLUMES_ROOT}/motioneye/etc:/etc/motioneye
  #     - ${DOCKER_VOLUMES_ROOT}/motioneye/var:/var/lib/motioneye
  #     - /mnt/mediahdd/motioneye:/media/motioneye
